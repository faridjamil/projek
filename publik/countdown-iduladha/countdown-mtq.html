<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown MTQ XXXI NTB 2026</title>
  <style>
    :root {
  --emerald: #10B981;
  --gold: #FFD700;
  --dark: #0F172A;
  --light: #F8FAFC;
  --glass: rgba(255,255,255,0.1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: url('https://images.unsplash.com/photo-1542816417-0983c9c9ad53?q=80&w=2069') center/cover;
  color: var(--light);
  transition:.3s;
  position: relative;
}

.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(15,23,42,0.9), rgba(16,185,129,0.7));
  backdrop-filter: blur(3px);
}

.container {
  position: relative;
  z-index: 2;
  text-align: center;
  padding: 2rem;
  background: var(--glass);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 24px;
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  max-width: 700px;
  width: 90%;
  animation: fadeIn 1s ease;
}

.logo {
  margin-bottom: 1rem;
  animation: float 3s ease-in-out infinite;
}

.bismillah {
  font-family: 'Scheherazade New', serif;
  font-size: 1.8rem;
  color: var(--gold);
  margin-bottom: 0.5rem;
}

h1 {
  font-size: clamp(1.5rem, 4vw, 2.5rem);
  font-weight: 700;
  margin-bottom: 0.5rem;
  background: linear-gradient(to right, var(--gold), #fff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.lokasi {
  opacity: 0.9;
  margin-bottom: 2rem;
  font-weight: 300;
}

#countdown {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
  margin: 2rem 0;
}

.time-box {
  background: rgba(0,0,0,0.2);
  padding: 1.5rem 0.5rem;
  border-radius: 16px;
  border: 1px solid var(--gold);
}

.time-box span {
  font-size: clamp(2rem, 6vw, 3.5rem);
  font-weight: 700;
  display: block;
  color: var(--gold);
}

.time-box p {
  font-size: 0.9rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  opacity: 0.8;
}

.quote {
  font-style: italic;
  opacity: 0.7;
  margin: 2rem 0 1rem;
  font-size: 0.9rem;
}

#theme-toggle {
  background: var(--emerald);
  color: white;
  border: none;
  padding: 0.7rem 1.5rem;
  border-radius: 50px;
  cursor: pointer;
  font-weight: 500;
  transition:.3s;
}

#theme-toggle:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(16,185,129,0.4);
}

/* Dark Mode */
body.dark {
  --light: #0F172A;
}
body.dark.overlay {
  background: linear-gradient(135deg, rgba(2,6,23,0.95), rgba(6,78,59,0.8));
}
body.dark.container {
  background: rgba(15,23,42,0.5);
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

@keyframes float {
  0%, 100% {transform: translateY(0);}
  50% {transform: translateY(-10px);}
}

@media (max-width: 600px) {
  #countdown {grid-template-columns: repeat(2, 1fr);}
}
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Scheherazade+New:wght@700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="overlay"></div>
  <main class="container">
    <div class="logo">
      <svg width="80" height="80" viewBox="0 0 100 100" fill="none">
        <path d="M50 5L95 50L50 95L5 50L50 5Z" stroke="#FFD700" stroke-width="3"/>
        <circle cx="50" cy="50" r="15" fill="#10B981"/>
      </svg>
    </div>

    <h2 class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيم</h2>
    <h1>MTQ XXXI Tingkat Provinsi NTB 2026</h1>
    <p class="lokasi">Kabupaten Lombok Tengah | 8 - 18 Juni 2026</p>

    <div id="countdown">
      <div class="time-box">
        <span id="days">00</span>
        <p>Hari</p>
      </div>
      <div class="time-box">
        <span id="hours">00</span>
        <p>Jam</p>
      </div>
      <div class="time-box">
        <span id="minutes">00</span>
        <p>Menit</p>
      </div>
      <div class="time-box">
        <span id="seconds">00</span>
        <p>Detik</p>
      </div>
    </div>

    <p class="quote">"Dan bacalah Al-Qur'an itu dengan perlahan-lahan" - QS. Al-Muzzammil: 4</p>

    <button id="theme-toggle">🌙 Mode Gelap</button>
  </main>

  <script>
    // Target: 8 Juni 2026, 00:00 WITA
const targetDate = new Date('2026-06-08T00:00:00+08:00').getTime();

const daysEl = document.getElementById('days');
const hoursEl = document.getElementById('hours');
const minutesEl = document.getElementById('minutes');
const secondsEl = document.getElementById('seconds');

function updateCountdown() {
  const now = new Date().getTime();
  const distance = targetDate - now;

  if (distance < 0) {
    document.getElementById('countdown').innerHTML = '<h2>MTQ XXXI NTB 2026 Sedang Berlangsung!</h2>';
    return;
  }

  const days = Math.floor(distance / (1000 * 60 * 60 * 24));
  const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  const seconds = Math.floor((distance % (1000 * 60)) / 1000);

  daysEl.textContent = String(days).padStart(2, '0');
  hoursEl.textContent = String(hours).padStart(2, '0');
  minutesEl.textContent = String(minutes).padStart(2, '0');
  secondsEl.textContent = String(seconds).padStart(2, '0');
}

setInterval(updateCountdown, 1000);
updateCountdown();

// Theme Toggle
const toggle = document.getElementById('theme-toggle');
toggle.addEventListener('click', () => {
  document.body.classList.toggle('dark');
  toggle.textContent = document.body.classList.contains('dark')? '☀️ Mode Terang' : '🌙 Mode Gelap';
});
  </script>
</body>
</html>
